name: Build reel-render container image

# Cloudflare's CI (Workers Builds / Deploy button) has NO Docker, so it can't
# build the reel-render container. We build it ONCE here (GitHub runners have
# Docker) and push a PUBLIC image; every buyer's deploy just references the tag
# (see wrangler.deploy.toml [[containers]] image = docker.io/skalers/content-os-processor).
#
# Required repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (a Docker Hub access
# token for the `skalers` namespace). Run on container/ changes or manually.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "container/**"
      - ".github/workflows/build-container.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./container
          file: ./container/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            skalers/content-os-processor:latest
            skalers/content-os-processor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
