name: Sync with upstream

# Keeps your Content OS up to date AUTOMATICALLY — zero setup.
#
# Nightly, this pulls the latest code from the public upstream
# (github.com/systemstoscale/content-os) into your repo. Cloudflare Workers
# Builds then auto-redeploys your Worker, so you get every bug fix + new
# feature for free, without touching anything.
#
# Why it just works:
#   • Upstream is PUBLIC — no token, no PAT, no "Sync fork" button needed.
#   • Your settings (API keys, brand, connected accounts, license) live in your
#     Worker's KV, NOT in this repo — so updating the code never affects your
#     config or credentials.
#
# Don't want auto-updates? Delete this file from your repo.

on:
  schedule:
    - cron: "13 3 * * *" # 03:13 UTC daily (odd minute to dodge the herd)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest from upstream and redeploy
        run: |
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git remote add upstream https://github.com/systemstoscale/content-os.git 2>/dev/null \
            || git remote set-url upstream https://github.com/systemstoscale/content-os.git
          git fetch --quiet upstream main
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse upstream/main)" ]; then
            echo "Already up to date with upstream."
            exit 0
          fi
          # This repo is just a deploy vehicle — your config lives in your
          # Worker's KV, not here — so mirror upstream exactly. On the next
          # build, Cloudflare re-binds your existing KV/D1/R2 by name, so
          # nothing is lost.
          git reset --hard upstream/main
          git push --force origin main
          echo "Updated from upstream — Workers Builds will redeploy your Worker."
